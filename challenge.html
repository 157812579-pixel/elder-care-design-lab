<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>金牌设计师动画闯关</title><link rel="stylesheet" href="theme.css">
<style>
  .topbar button{border:1.5px solid #e6c88f;background:#fffdf7;color:#7b604b;border-radius:999px;padding:10px 17px;font-weight:800;cursor:pointer}.progress-card{background:#fffdf7;border:2px solid #e8c98a;border-radius:22px;padding:17px 20px;margin-bottom:18px;box-shadow:0 10px 24px rgba(92,60,30,.08);display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center}.progress-card b{color:#d67554}.progress{height:14px;background:#f3e7ce;border-radius:99px;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,#ec875f,#f3c967,#6eab9b);transition:.45s;border-radius:99px}.result{font-weight:900;color:#75604e;white-space:nowrap}
  .road{display:grid;grid-template-columns:repeat(4,1fr);gap:17px;background:rgba(255,253,247,.72);border:2px dashed #e6ba70;border-radius:30px;padding:24px}.station{position:relative;border:2.5px solid var(--c);border-radius:24px;background:#fffdf8;padding:19px 15px;min-height:164px;text-align:left;cursor:pointer;transition:.2s;box-shadow:0 8px 18px rgba(90,60,32,.08)}.station:hover{transform:translateY(-5px)}.station.done{background:#fff6cf;transform:translateY(-3px)}.badge{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;background:color-mix(in srgb,var(--c) 22%,white);border:2px solid var(--c);font-size:22px;font-weight:900;color:#654b3b}.station h2{font-size:19px;margin:14px 0 6px}.station small{display:block;color:#826e5e;line-height:1.55}.check{position:absolute;right:12px;top:12px;opacity:0;background:#6eab9b;color:#fff;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:900}.done .check{opacity:1}.finish{display:none;margin:20px auto 0;max-width:620px;text-align:center;background:#fffdf7;border:3px solid #efb65e;border-radius:27px;padding:24px;animation:pop .45s;box-shadow:var(--shadow)}.finish.show{display:block}.finish h2{font-size:30px;margin:4px}.finish a{display:inline-block;margin-top:10px;background:#5b9e92;color:white;text-decoration:none;padding:12px 21px;border-radius:15px;font-weight:900}@keyframes pop{from{transform:scale(.84);opacity:0}}@media(max-width:820px){.road{grid-template-columns:repeat(2,1fr)}}@media(max-width:520px){.road{grid-template-columns:1fr}.progress-card{grid-template-columns:1fr}.result{text-align:center}}
</style></head><body><main class="page"><nav class="topbar"><a href="index.html">← 返回课堂平台</a><button onclick="resetAll()">重新闯关</button></nav>
<section class="storybook-banner"><div class="storybook-copy"><span class="eyebrow">金牌设计师成长路线</span><h1>一步一步<br>把温暖做出来</h1><p>完成一项任务，就点击对应关卡。八站全部点亮后，你会获得本次探究的通关祝贺。</p></div><div class="storybook-art" style="background-image:url('assets/challenge-stairs.jpg')"></div></section>
<section class="progress-card"><b>本次进度</b><div class="progress"><div class="bar" id="bar"></div></div><span class="result" id="result"></span></section><section class="road" id="road"></section><section class="finish" id="finish"><span class="eyebrow">全部完成</span><h2>恭喜成为暖心设计师！</h2><p>你已经走完一次完整的助老产品设计探究。</p><a href="peer-review.html?role=student">去完成作品互评 →</a></section></main>
<script>
const levels=[['发现困难','听讲解，留心长辈生活中的不便','察','#e9826e'],['提出问题','说说长辈还遇到过哪些难处','问','#ef9b55'],['问卷调查','用事实找到真正需要解决的问题','访','#e4b94e'],['整理数据','找出最值得优先解决的困难','理','#6fa99b'],['创意构思','画出产品草图与使用方法','想','#78a8c7'],['制作模型','把平面想法变成立体作品','做','#a58cba'],['体验修改','请他人试用，再调整细节','试','#80a86d'],['展示评价','介绍作品，听取同伴建议','展','#e9826e']];
let done=JSON.parse(localStorage.getItem('elderChallenge')||'[]');const road=document.getElementById('road');
function draw(){road.innerHTML='';levels.forEach((l,i)=>{const d=document.createElement('article');d.className='station '+(done.includes(i)?'done':'');d.style.setProperty('--c',l[3]);d.innerHTML=`<span class="check">已完成</span><div class="badge">${done.includes(i)?'✓':l[2]}</div><h2>${String(i+1).padStart(2,'0')} · ${l[0]}</h2><small>${l[1]}</small>`;d.onclick=()=>toggle(i);road.appendChild(d)});document.getElementById('bar').style.width=(done.length/8*100)+'%';document.getElementById('result').textContent=`${done.length} / 8 关`;document.getElementById('finish').classList.toggle('show',done.length===8)}
function toggle(i){done=done.includes(i)?done.filter(x=>x!==i):[...done,i].sort((a,b)=>a-b);localStorage.setItem('elderChallenge',JSON.stringify(done));draw()}function resetAll(){done=[];localStorage.removeItem('elderChallenge');draw()}draw();
</script></body></html>
