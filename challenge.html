<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>金牌设计师动画闯关</title>
<style>
:root{--ink:#5b4636;--paper:#fffdf7;--orange:#ef9b55;--teal:#71b6a6}*{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei","PingFang SC",sans-serif;color:var(--ink);min-height:100vh;background:linear-gradient(#fff4cf,#ffe4c8)}.wrap{max-width:1060px;margin:auto;padding:26px 20px 60px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px}.back{color:#7c604b;text-decoration:none;font-weight:700}.top button,.reset{border:0;background:#fff;color:#8a684f;border-radius:999px;padding:10px 16px;font-weight:700;cursor:pointer}.hero{text-align:center}.hero h1{font-size:clamp(31px,5vw,50px);margin:18px 0 6px}.hero p{margin:0 0 20px;color:#856f5c}.progress{height:16px;background:#fff;border-radius:99px;overflow:hidden;border:2px solid #e9c98e;max-width:720px;margin:0 auto 26px}.bar{height:100%;width:0;background:linear-gradient(90deg,#f39b67,#ffd367,#6fbaa7);transition:.45s}.road{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:32px 38px;background:rgba(255,253,247,.88);border:3px solid #efc77c;border-radius:32px;padding:36px;box-shadow:0 16px 35px rgba(105,69,34,.12)}.road:before{content:"";position:absolute;left:10%;right:10%;top:50%;border-top:5px dashed #efb76d;transform:rotate(-2deg);opacity:.55}.station{position:relative;z-index:1;border:3px solid var(--c);border-radius:24px;background:#fff;padding:18px 10px;min-height:145px;text-align:center;cursor:pointer;transition:.2s;box-shadow:0 8px 18px rgba(90,60,32,.08)}.station:hover{transform:translateY(-5px) rotate(-1deg)}.station.done{background:#fff8d8;transform:scale(1.03)}.station.done .badge{animation:bounce .5s}.badge{width:58px;height:58px;border-radius:50%;display:grid;place-items:center;background:color-mix(in srgb,var(--c) 25%,white);border:3px solid var(--c);margin:auto;font-size:26px}.station h2{font-size:18px;margin:10px 0 5px}.station small{color:#8a7563}.check{position:absolute;right:8px;top:7px;opacity:0;font-size:24px}.done .check{opacity:1}.result{text-align:center;margin-top:22px;font-weight:700;font-size:18px}.finish{display:none;margin:22px auto 0;max-width:600px;text-align:center;background:#fff;border:3px solid #efb65e;border-radius:25px;padding:22px;animation:pop .45s}.finish.show{display:block}.finish h2{font-size:29px;margin:4px}.finish a{display:inline-block;margin-top:10px;background:var(--teal);color:white;text-decoration:none;padding:11px 20px;border-radius:999px;font-weight:700}@keyframes bounce{50%{transform:translateY(-12px) rotate(8deg)}}@keyframes pop{from{transform:scale(.7);opacity:0}}@media(max-width:760px){.road{grid-template-columns:repeat(2,1fr);gap:18px;padding:22px}.road:before{display:none}.station{min-height:135px}}
</style></head><body><main class="wrap"><div class="top"><a class="back" href="index.html">← 返回课堂平台</a><button onclick="resetAll()">重新闯关</button></div><section class="hero"><h1>🏆 金牌设计师闯关路线</h1><p>每完成一项任务，就点击对应关卡点亮星星。</p><div class="progress"><div class="bar" id="bar"></div></div></section><section class="road" id="road"></section><div class="result" id="result"></div><section class="finish" id="finish"><div style="font-size:55px">🎉</div><h2>全部通关！</h2><p>你已经完成一次完整的助老产品设计探究。</p><a href="peer-review.html?role=student">去完成作品互评 →</a></section></main>
<script>
const levels=[['发现困难','听数字人讲生活难处','👀','#ee8f78'],['提出问题','说说长辈还有哪些不便','💬','#ef9b55'],['问卷调查','用事实找到真实需要','📝','#e9bd51'],['整理数据','找出最值得解决的问题','📊','#71b6a6'],['创意构思','画出产品草图','💡','#7daed1'],['制作模型','把想法变成立体作品','🧩','#aa8fc2'],['体验修改','请长辈试一试再改进','🛠️','#79a873'],['展示评价','分享作品并互相评价','🌟','#ee8f78']];
let done=JSON.parse(localStorage.getItem('elderChallenge')||'[]');const road=document.getElementById('road');
function draw(){road.innerHTML='';levels.forEach((l,i)=>{const d=document.createElement('article');d.className='station '+(done.includes(i)?'done':'');d.style.setProperty('--c',l[3]);d.innerHTML=`<span class="check">✅</span><div class="badge">${done.includes(i)?'⭐':l[2]}</div><h2>${i+1}. ${l[0]}</h2><small>${l[1]}</small>`;d.onclick=()=>toggle(i);road.appendChild(d)});document.getElementById('bar').style.width=(done.length/8*100)+'%';document.getElementById('result').textContent=`已完成 ${done.length} / 8 关`;document.getElementById('finish').classList.toggle('show',done.length===8)}
function toggle(i){done=done.includes(i)?done.filter(x=>x!==i):[...done,i].sort((a,b)=>a-b);localStorage.setItem('elderChallenge',JSON.stringify(done));draw()}function resetAll(){done=[];localStorage.removeItem('elderChallenge');draw()}draw();
</script></body></html>
