<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>助老产品作品评价</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    :root{--accent:#78a8c7;--accent-soft:#e7f3fa;--accent-deep:#4f86aa}
    .head{text-align:center}.switch{display:flex;justify-content:center;gap:10px;margin:0 0 20px}.switch a{text-decoration:none;color:#6e5a4b;padding:11px 22px;background:#fff;border-radius:999px;border:2px solid #ecd2a7;font-weight:900}.switch a.on{background:var(--accent);color:#fff;border-color:var(--accent)}
    .score-key{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin:-4px 0 22px}.score-key span{padding:6px 10px;border-radius:999px;background:rgba(255,253,247,.86);border:1px solid #ead8b6;color:#806b58;font-size:13px}.score-key b{color:var(--accent-deep)}
    .review-layout{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:22px;align-items:start}form,.result-card,.guide{padding:28px}.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}.field{margin-bottom:18px}label{display:block;font-weight:900;margin-bottom:7px}input,textarea{width:100%;border:2px solid #ead5b2;border-radius:14px;padding:12px 13px;font:inherit;background:#fff}textarea{min-height:104px;resize:vertical}.field-help{display:block;color:#927966;font-size:13px;margin:6px 2px 0;line-height:1.55}
    .rubric-heading{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin:7px 0 13px}.rubric-heading h2{font-size:23px;margin:0}.rubric-heading span{font-size:13px;color:#8b725f}.ratings{display:grid;gap:14px;margin-bottom:22px}.rating{position:relative;background:linear-gradient(135deg,#fffaf0,#fff);border:1.7px solid #ecd49f;border-radius:20px;padding:18px 18px 16px}.rating-top{display:flex;align-items:flex-start;gap:12px}.badge{flex:0 0 38px;height:38px;border-radius:13px;display:grid;place-items:center;background:var(--accent);color:#fff;font-weight:900}.criterion-title{font-size:18px;font-weight:900;line-height:1.35}.criterion-title small{display:block;color:#8a725f;font-size:14px;font-weight:700;margin-top:3px}.criterion-desc{color:#6f5d4f;line-height:1.7;margin:11px 0 9px}.checks{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}.checks span{background:var(--accent-soft);color:var(--accent-deep);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}.score-line{display:flex;justify-content:space-between;align-items:center;gap:12px;border-top:1px dashed #e3cda7;padding-top:10px}.stars{display:flex;gap:2px}.stars button{border:0;background:transparent;font-size:29px;line-height:1;color:#d9c9ad;cursor:pointer;padding:2px}.stars button.on{color:#eda13e;text-shadow:0 2px 0 #fff}.score-text{min-width:86px;text-align:right;color:#927966;font-size:13px;font-weight:800}
    .submit{border:0;border-radius:17px;background:var(--accent);color:#fff;padding:15px 28px;font-size:18px;font-weight:900;cursor:pointer;width:100%}.guide{background:#fff9e9;border:2px solid #e8c98a;border-radius:25px;box-shadow:0 12px 28px rgba(92,60,30,.09);position:sticky;top:18px}.guide h2{font-size:22px;margin:0 0 13px}.guide-list{display:grid;gap:10px}.guide-item{background:#fff;border:1px solid #ecd8b2;border-radius:15px;padding:11px 12px}.guide-item b{display:block;color:var(--accent-deep);margin-bottom:4px}.guide-item span{font-size:13px;line-height:1.55;color:#786454}.sentence{background:#eef6e8;border-radius:15px;padding:12px;line-height:1.65;color:#61755b;margin-top:14px}.ai-note{margin-top:14px;background:var(--accent-soft);border-radius:16px;padding:13px;color:#5d6d78;font-size:13px;line-height:1.65}.ai-note b{color:var(--accent-deep)}
    .result-card{display:none;margin-top:24px}.result-card.show{display:block}.result-head{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;border-bottom:2px dashed #e7cea1;padding-bottom:15px}.result-head h2{color:var(--accent-deep);margin:0 0 5px}.result-head p{margin:0;color:#806b59}.total{flex:0 0 auto;width:92px;height:92px;border-radius:25px;background:var(--accent-soft);display:grid;place-items:center;text-align:center;color:var(--accent-deep);font-weight:900}.total strong{display:block;font-size:28px;line-height:1}.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0}.result-item{background:#fff9eb;border:1px solid #ead5ad;border-radius:16px;padding:13px}.result-item b{display:block;margin-bottom:6px}.result-item span{color:#7c6756;line-height:1.6;font-size:14px}.written{display:grid;gap:10px;margin:15px 0}.written div{border-left:5px solid var(--accent);background:#fff;padding:12px 14px;border-radius:4px 14px 14px 4px;line-height:1.7}.ai-result{background:linear-gradient(135deg,var(--accent-soft),#fffaf0);border:2px solid color-mix(in srgb,var(--accent) 50%,#ead0a0);border-radius:22px;padding:18px;margin:18px 0}.ai-result h3{margin:0 0 5px;color:var(--accent-deep)}.ai-result>p{margin:0 0 13px;color:#776454;font-size:13px}.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.ai-item{background:rgba(255,255,255,.82);border-radius:14px;padding:11px 12px;line-height:1.6;font-size:14px}.ai-item:last-child{grid-column:1/-1}.ai-item b{color:var(--accent-deep)}.actions{display:flex;flex-wrap:wrap;gap:10px}.actions button,.actions a{border:0;border-radius:14px;background:#fff0c7;color:#6c5542;padding:11px 16px;font-weight:900;text-decoration:none;cursor:pointer}
    @media(max-width:780px){.review-layout{grid-template-columns:1fr}.guide{position:static}.row,.result-grid,.ai-grid{grid-template-columns:1fr}.ai-item:last-child{grid-column:auto}form,.result-card{padding:20px}.score-line{align-items:flex-start;flex-direction:column}.score-text{text-align:left}.storybook-copy h1 br{display:none}}
    @media print{body{background:#fff}.topbar,.storybook-banner,.switch,.score-key,.review-layout,.actions{display:none!important}.page{width:100%;padding:0}.result-card{display:block!important;box-shadow:none!important;border:0!important;margin:0}}
  </style>
</head>
<body>
<main class="page">
  <nav class="topbar"><a href="index.html">← 返回课堂平台</a><span>公开网页 · 本机生成</span></nav>
  <section class="storybook-banner">
    <div class="storybook-copy"><span class="eyebrow" id="eyebrow">同伴互助</span><h1 id="title"></h1><p id="intro"></p></div>
    <div class="storybook-art" id="art"></div>
  </section>
  <nav class="switch"><a id="stu" href="?role=student">学生互评</a><a id="tea" href="?role=teacher">教师点评</a></nav>
  <div class="score-key"><span><b>1星</b> 尚需完善</span><span><b>2星</b> 初步完成</span><span><b>3星</b> 基本达成</span><span><b>4星</b> 表现良好</span><span><b>5星</b> 突出优秀</span></div>

  <section class="review-layout">
    <form id="reviewForm">
      <div class="row">
        <div class="field"><label for="author">评价人 *</label><input id="author" required placeholder="姓名或小组名称"></div>
        <div class="field"><label for="work">被评价作品 *</label><input id="work" required placeholder="如：暖心提醒药盒"></div>
      </div>
      <div class="row">
        <div class="field"><label for="group">作品小组</label><input id="group" placeholder="如：居家暖阳组"></div>
        <div class="field"><label for="scene">主要使用场景</label><input id="scene" placeholder="如：老人独自在家服药时"></div>
      </div>

      <div class="rubric-heading"><h2 id="rubricTitle">逐项观察与评分</h2><span>四项均需完成</span></div>
      <div class="ratings" id="ratings"></div>

      <div class="field">
        <label for="evidence" id="evidenceLabel">我看到的调研证据 *</label>
        <textarea id="evidence" required></textarea>
        <span class="field-help" id="evidenceHelp"></span>
      </div>
      <div class="field">
        <label for="good" id="goodLabel">最值得肯定的一点 *</label>
        <textarea id="good" required></textarea>
      </div>
      <div class="field">
        <label for="tip" id="tipLabel">下一步改进建议 *</label>
        <textarea id="tip" required></textarea>
      </div>
      <button class="submit" type="submit" id="submitBtn">生成完整评价卡</button>
    </form>

    <aside class="guide">
      <h2 id="guideTitle">评价时重点看什么</h2>
      <div class="guide-list" id="guideList"></div>
      <div class="sentence" id="sentence"></div>
      <div class="ai-note"><b>数智辅助评价</b><br>提交后，页面会根据四项得分和填写内容，从调研洞察、创新设计、人文安全、成果表达、综合成长五方面给出后续修改提醒。</div>
    </aside>
  </section>

  <section class="result-card" id="resultCard">
    <div class="result-head"><div><h2 id="resultTitle">作品评价卡</h2><p id="resultMeta"></p></div><div class="total" id="total"></div></div>
    <div class="result-grid" id="resultGrid"></div>
    <div class="written" id="written"></div>
    <section class="ai-result"><h3>AI数智辅助评价</h3><p>依据本次四项评分与文字记录自动整理，供作品修改时参考。</p><div class="ai-grid" id="aiGrid"></div></section>
    <div class="actions"><button type="button" id="downloadBtn">下载文字记录</button><button type="button" id="copyBtn">复制评价内容</button><button type="button" onclick="window.print()">打印评价卡</button><a href="challenge.html">继续闯关</a></div>
  </section>
</main>

<script>
  const role=new URLSearchParams(location.search).get('role')==='teacher'?'teacher':'student';
  const $=id=>document.getElementById(id);
  const scoreNames=['','尚需完善','初步完成','基本达成','表现良好','突出优秀'];
  const configs={
    student:{
      accent:'#78a8c7',soft:'#e7f3fa',deep:'#4f86aa',eyebrow:'同伴互助',
      title:'认真观察，写下<br>有依据的同伴建议',
      intro:'围绕真实需求、解决办法、安全细节和分享表达逐项评价，让同伴知道作品好在哪里、下一步怎样改。',
      art:'assets/review-pair.jpg',
      evidenceLabel:'我看到的调研证据 *',
      evidencePlaceholder:'如：作品组采访了独居老人，记录了老人容易忘记服药时间的问题，并展示了采访照片。',
      evidenceHelp:'要写清“采访了谁、发现什么困难、有什么照片或记录”，不要只写“做了调查”。',
      goodLabel:'我最欣赏的设计细节 *',goodPlaceholder:'如：药盒按钮又大又醒目，老人戴着老花镜也容易找到。',
      tipLabel:'我建议下一步这样修改 *',tipPlaceholder:'如：可以增加不同时间的语音提醒，并把开盖处做成防滑凹槽，单手也能打开。',
      guideTitle:'同伴互评要做到',
      sentence:'推荐句式：“我从……看出你们发现了……问题；我最喜欢……；如果再把……改成……，老人使用时会更方便。”',
      criteria:[
        {title:'慧眼识需',sub:'发现老人真困难',desc:'作品来自真实走访，能够说清服务哪类老人、在什么情境下遇到什么困难，并有采访照片、记录或原话作为依据。',checks:['对象明确','困难真实','证据完整']},
        {title:'巧思解困',sub:'创意解决真问题',desc:'产品功能能直接回应调研中发现的困难，构思有新意，操作步骤不过分复杂，材料和制作方法在课堂条件下可以实现。',checks:['功能对症','创意合理','能够落地']},
        {title:'匠心守护',sub:'贴心安全有温度',desc:'考虑老人视力、听力和行动特点，具有大字、大按钮、清晰提示、防滑圆角或防误触等适老细节，使用过程安全省力。',checks:['操作简单','安全可靠','细节贴心']},
        {title:'暖心分享',sub:'讲出设计故事',desc:'能按“发现困难—提出创意—制作模型—测试修改”的顺序讲清过程，并结合老人真实经历说明设计价值和敬老感悟。',checks:['过程完整','表达清楚','感悟真实']}
      ],
      guides:[['先找证据','看看有没有采访对象、生活困难和图文记录。'],['再看对应','每一项功能是否真的解决前面发现的问题。'],['检查安全','老人能否看清、拿稳、按准，是否存在夹手或误触。'],['说具体话','指出作品中的具体位置或功能，不写空泛的“很好”。']]
    },
    teacher:{
      accent:'#a58cba',soft:'#f1eafa',deep:'#7c6492',eyebrow:'成长指导',
      title:'依据过程证据，给出<br>清楚可行的教师点评',
      intro:'从调查探究、创新实践、适老安全和复盘表达四方面记录学生表现，让评价既看成果，也看过程与成长。',
      art:'assets/hero-teacher.jpg',
      evidenceLabel:'评价所依据的过程证据 *',
      evidencePlaceholder:'如：小组完成2次访谈，整理3条老人原话；第二版模型根据试用反馈增大了按钮并增加防滑底垫。',
      evidenceHelp:'建议写明访谈、草图、模型修改、试用记录等可核对的课堂证据。',
      goodLabel:'本组最突出的学习表现 *',goodPlaceholder:'如：能够把访谈中“看不清小字”的原话转化为高对比度大字显示屏，需求与功能对应清楚。',
      tipLabel:'下一阶段指导意见 *',tipPlaceholder:'如：补充真实使用测试，请两位老人分别完成一次操作，记录用时和困难，再据此修改开关位置。',
      guideTitle:'教师点评重点观察',
      sentence:'推荐句式：“从……过程材料可以看出，本组已经做到……；目前需要重点改进……；下一步请通过……完成验证。”',
      criteria:[
        {title:'深入调研察痛点',sub:'调查探究是否真实深入',desc:'学生能选择合适的老年群体开展走访，使用访谈、观察或体验等方法获取一手材料，并从资料中提炼具体、可信的生活问题。',checks:['方法恰当','一手证据','问题准确']},
        {title:'数智巧手破难题',sub:'创新实践是否有效',desc:'能运用数字工具辅助资料整理、方案比较和模型制作，并综合美术、科学、劳动等知识，使产品功能与调研需求形成清楚对应。',checks:['工具适切','跨科融合','创意有效']},
        {title:'暖心设计守安全',sub:'适老细节是否经得住使用',desc:'产品兼顾易看、易懂、易握、易操作和防风险要求，能够说明安全细节的设计依据，并根据试用反馈作出调整。',checks:['适老友好','安全细致','测试改进']},
        {title:'复盘分享悟成长',sub:'成果展示是否体现成长',desc:'能完整呈现调查、构思、制作、测试与修改过程，说明成功与不足，清楚表达合作分工、敬老体会和下一步改进方向。',checks:['历程完整','反思具体','表达有序']}
      ],
      guides:[['看真实过程','评价要能在访谈记录、草图或模型版本中找到依据。'],['看能力变化','关注学生怎样发现问题、合作决策和根据反馈修改。'],['看适老价值','判断功能是否实用，安全细节是否经过测试。'],['给行动建议','明确下一步做什么、怎样做、用什么证据证明改好了。']]
    }
  };

  const cfg=configs[role];
  document.documentElement.style.setProperty('--accent',cfg.accent);
  document.documentElement.style.setProperty('--accent-soft',cfg.soft);
  document.documentElement.style.setProperty('--accent-deep',cfg.deep);
  $('title').innerHTML=cfg.title;$('intro').textContent=cfg.intro;$('eyebrow').textContent=cfg.eyebrow;
  $('art').style.backgroundImage=`url('${cfg.art}')`;
  $(role==='teacher'?'tea':'stu').classList.add('on');
  $('evidenceLabel').textContent=cfg.evidenceLabel;$('evidence').placeholder=cfg.evidencePlaceholder;$('evidenceHelp').textContent=cfg.evidenceHelp;
  $('goodLabel').textContent=cfg.goodLabel;$('good').placeholder=cfg.goodPlaceholder;
  $('tipLabel').textContent=cfg.tipLabel;$('tip').placeholder=cfg.tipPlaceholder;
  $('guideTitle').textContent=cfg.guideTitle;$('sentence').textContent=cfg.sentence;
  $('guideList').innerHTML=cfg.guides.map(x=>`<div class="guide-item"><b>${x[0]}</b><span>${x[1]}</span></div>`).join('');

  const scores=[0,0,0,0];
  const ratings=$('ratings');
  cfg.criteria.forEach((c,i)=>{
    const box=document.createElement('article');box.className='rating';
    box.innerHTML=`<div class="rating-top"><span class="badge">${i+1}</span><div class="criterion-title">${c.title}<small>${c.sub}</small></div></div><p class="criterion-desc">${c.desc}</p><div class="checks">${c.checks.map(x=>`<span>${x}</span>`).join('')}</div><div class="score-line"><div class="stars" aria-label="${c.title}评分">${[1,2,3,4,5].map(n=>`<button type="button" data-i="${i}" data-n="${n}" aria-label="${n}星">★</button>`).join('')}</div><span class="score-text" id="scoreText${i}">请选择星级</span></div>`;
    ratings.appendChild(box);
  });
  ratings.addEventListener('click',e=>{
    const btn=e.target.closest('button[data-n]');if(!btn)return;
    const i=Number(btn.dataset.i),n=Number(btn.dataset.n);scores[i]=n;
    ratings.querySelectorAll(`[data-i="${i}"]`).forEach(x=>x.classList.toggle('on',Number(x.dataset.n)<=n));
    $(`scoreText${i}`).textContent=`${n}星 · ${scoreNames[n]}`;
  });

  const clean=s=>String(s||'').trim();
  const esc=s=>clean(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const dimensionAdvice=(index,score)=>{
    const bank=[
      ['调研洞察','补充采访对象、具体情境和老人原话，把“老人不方便”改写成可观察、可验证的真实困难。','已能找到真实困难，建议继续整理采访图片、原话和发生频率，让需求判断更有依据。','调研证据较完整，可进一步比较不同老人或不同场景的差异，确定最需要优先解决的问题。'],
      ['创新设计','先把一个核心困难对应一个主要功能，画出操作步骤，再判断老人能否轻松完成。','方案能够回应需求，建议用两个不同构思进行比较，从方便、安全和制作难度中选出更合适的一种。','创意与需求对应较好，可进一步优化结构、材料或交互方式，并说明选择该方案的理由。'],
      ['人文安全','重点检查大字、大按钮、防滑、圆角、防误触和单手操作，至少完成一次模拟使用。','已有适老意识，建议邀请同伴扮演视力或行动不便的老人试用，记录看不清、拿不稳、按不准的地方。','安全与适老细节较成熟，可增加真实试用记录，并根据反馈完成一处有证据的二次修改。'],
      ['成果表达','按照“发现困难—提出方案—制作模型—测试修改”整理材料，每一步配一条证据。','过程基本清楚，建议补充一次失败或修改经历，并说明为什么改、改后有什么变化。','表达完整有序，可用老人真实故事串联设计过程，让作品价值和敬老感悟更具体。']
    ];
    const item=bank[index];return {name:item[0],text:score<=2?item[1]:score===3?item[2]:item[3]};
  };

  let textRecord='';
  $('reviewForm').addEventListener('submit',e=>{
    e.preventDefault();
    if(scores.some(x=>!x)){alert('请完成四项星级评价');ratings.scrollIntoView({behavior:'smooth',block:'center'});return;}
    const author=clean($('author').value),work=clean($('work').value),group=clean($('group').value)||'未填写',scene=clean($('scene').value)||'未填写';
    const evidence=clean($('evidence').value),good=clean($('good').value),tip=clean($('tip').value);
    const sum=scores.reduce((a,b)=>a+b,0),avg=sum/4;
    const level=avg>=4.5?'暖阳金牌设计':avg>=3.75?'表现优秀':avg>=3?'达到目标':avg>=2?'继续完善':'需要重点修改';
    const ai=cfg.criteria.map((_,i)=>dimensionAdvice(i,scores[i]));
    ai.push({name:'综合成长',text:avg>=4?'本次作品已经体现较好的问题意识、动手能力与敬老情感。下一步要保留完整版本记录，并用真实试用结果证明改进有效。':avg>=3?'本次实践已形成基本完整的学习链条。下一步选择得分最低的一项重点修改，保留修改前后对比和测试证据。':'建议先回到真实需求，重新确认服务对象和核心困难，再依次修改功能、安全和表达，避免同时解决过多问题。'});

    $('resultTitle').textContent=role==='teacher'?'教师作品点评卡':'学生作品互评卡';
    $('resultMeta').textContent=`作品：${work}｜作品小组：${group}｜评价人：${author}`;
    $('total').innerHTML=`<div><strong>${sum}</strong><span>总分 / 20<br>${level}</span></div>`;
    $('resultGrid').innerHTML=cfg.criteria.map((c,i)=>`<div class="result-item"><b>${c.title}：${scores[i]}星</b><span>${scoreNames[scores[i]]}。${c.desc}</span></div>`).join('');
    $('written').innerHTML=`<div><b>使用场景：</b>${esc(scene)}</div><div><b>过程证据：</b>${esc(evidence)}</div><div><b>值得肯定：</b>${esc(good)}</div><div><b>改进建议：</b>${esc(tip)}</div>`;
    $('aiGrid').innerHTML=ai.map(x=>`<div class="ai-item"><b>${x.name}：</b>${x.text}</div>`).join('');
    textRecord=`${role==='teacher'?'教师作品点评卡':'学生作品互评卡'}\n作品：${work}\n作品小组：${group}\n评价人：${author}\n使用场景：${scene}\n\n${cfg.criteria.map((c,i)=>`${i+1}. ${c.title}（${c.sub}）：${scores[i]}星·${scoreNames[scores[i]]}`).join('\n')}\n总分：${sum}/20（${level}）\n\n过程证据：${evidence}\n值得肯定：${good}\n改进建议：${tip}\n\nAI数智辅助评价\n${ai.map((x,i)=>`${i+1}. ${x.name}：${x.text}`).join('\n')}\n\n生成时间：${new Date().toLocaleString()}`;
    localStorage.setItem(`elderReviewLatest-${role}`,textRecord);
    $('resultCard').classList.add('show');$('resultCard').scrollIntoView({behavior:'smooth'});
  });

  $('downloadBtn').addEventListener('click',()=>{
    if(!textRecord)return;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([textRecord],{type:'text/plain;charset=utf-8'}));a.download=(clean($('work').value)||'助老产品')+(role==='teacher'?'教师点评':'学生互评')+'.txt';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  });
  $('copyBtn').addEventListener('click',async()=>{if(!textRecord)return;try{await navigator.clipboard.writeText(textRecord);alert('评价内容已复制');}catch{alert('当前浏览器不支持自动复制，请下载文字记录。')}});
</script>
</body>
</html>
