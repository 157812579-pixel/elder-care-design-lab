<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>作品评价入口</title>
<style>:root{--ink:#584536;--paper:#fffdf8;--accent:#7daed1}*{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei","PingFang SC",sans-serif;color:var(--ink);background:linear-gradient(135deg,#fff5d2,#fbe4d8);min-height:100vh}.wrap{max-width:900px;margin:auto;padding:26px 18px 60px}.back{text-decoration:none;color:#785f4d;font-weight:700}.head{text-align:center}.head h1{font-size:clamp(30px,5vw,48px);margin:20px 0 7px}.switch{display:flex;justify-content:center;gap:10px;margin:18px}.switch a{text-decoration:none;color:#6e5a4b;padding:9px 17px;background:#fff;border-radius:999px;border:2px solid #ecd2a7;font-weight:700}.switch a.on{background:var(--accent);color:#fff;border-color:var(--accent)}form,.card{background:rgba(255,253,248,.96);border:3px solid #e9c88b;border-radius:28px;padding:26px;box-shadow:0 14px 35px rgba(100,65,35,.12)}.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}.field{margin-bottom:18px}label{display:block;font-weight:700;margin-bottom:7px}input,textarea{width:100%;border:2px solid #ead5b2;border-radius:13px;padding:12px 13px;font:inherit;background:#fff}textarea{min-height:94px;resize:vertical}.ratings{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}.rating{background:#fff7e6;border-radius:16px;padding:13px}.stars{display:flex;gap:6px}.stars input{display:none}.stars label{font-size:29px;color:#d8c7ad;cursor:pointer;margin:0}.stars label.on{color:#f0a53e}.submit{border:0;border-radius:999px;background:var(--accent);color:#fff;padding:13px 28px;font-size:18px;font-weight:700;cursor:pointer;width:100%;margin-top:6px}.card{display:none;margin-top:22px}.card.show{display:block}.card h2{color:var(--accent)}.actions{display:flex;flex-wrap:wrap;gap:10px}.actions button,.actions a{border:0;border-radius:999px;background:#fff0c7;color:#6c5542;padding:10px 16px;font-weight:700;text-decoration:none;cursor:pointer}@media(max-width:650px){.row,.ratings{grid-template-columns:1fr}form{padding:20px}}</style></head>
<body><main class="wrap"><a class="back" href="index.html">← 返回课堂平台</a><header class="head"><h1 id="title"></h1><p id="intro"></p><nav class="switch"><a id="stu" href="?role=student">学生互评</a><a id="tea" href="?role=teacher">教师点评</a></nav></header><form id="form"><div class="row"><div class="field"><label>评价人 *</label><input id="author" required placeholder="填写姓名或小组"></div><div class="field"><label>被评价作品 *</label><input id="work" required placeholder="填写作品名称"></div></div><div class="ratings" id="ratings"></div><div class="field"><label>我看到的优点 *</label><textarea id="good" required placeholder="说清楚哪一点做得好"></textarea></div><div class="field"><label>我的改进建议 *</label><textarea id="tip" required placeholder="提出一条具体、能做到的建议"></textarea></div><button class="submit" type="submit">生成评价卡</button></form><section class="card" id="card"><h2>🌼 作品评价卡</h2><div id="out"></div><div class="actions"><button onclick="downloadCard()">下载文字记录</button><button onclick="copyCard()">复制评价内容</button><a href="challenge.html">继续闯关</a></div></section></main>
<script>const role=new URLSearchParams(location.search).get('role')==='teacher'?'teacher':'student';const accent=role==='teacher'?'#aa8fc2':'#7daed1';document.documentElement.style.setProperty('--accent',accent);title.textContent=role==='teacher'?'👩‍🏫 教师作品点评':'🧒 学生作品互评';intro.textContent=role==='teacher'?'从需求、功能、安全和表达四方面给出指导。':'先说出具体优点，再提出一条能做到的建议。';document.getElementById(role==='teacher'?'tea':'stu').classList.add('on');const dims=['需求贴合','功能清楚','安全可靠','表达完整'];let scores=[0,0,0,0],text='';const ratings=document.getElementById('ratings');dims.forEach((d,i)=>{const box=document.createElement('div');box.className='rating';box.innerHTML=`<b>${d}</b><div class="stars">${[1,2,3,4,5].map(n=>`<label data-i="${i}" data-n="${n}">★</label>`).join('')}</div>`;ratings.appendChild(box)});ratings.onclick=e=>{if(e.target.dataset.n){const i=+e.target.dataset.i,n=+e.target.dataset.n;scores[i]=n;ratings.querySelectorAll(`[data-i="${i}"]`).forEach(x=>x.classList.toggle('on',+x.dataset.n<=n))}};form.onsubmit=e=>{e.preventDefault();if(scores.some(x=>!x)){alert('请完成四项星级评价');return}text=`${role==='teacher'?'教师点评':'学生互评'}\n评价人：${author.value}\n作品：${work.value}\n${dims.map((d,i)=>d+'：'+scores[i]+'星').join('\n')}\n优点：${good.value}\n建议：${tip.value}\n时间：${new Date().toLocaleString()}`;out.innerHTML=text.replaceAll('\n','<br>');card.classList.add('show');localStorage.setItem('elderReviewLatest',text);card.scrollIntoView({behavior:'smooth'})};function downloadCard(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));a.download=(work.value||'作品')+'评价.txt';a.click()}async function copyCard(){await navigator.clipboard.writeText(text);alert('评价内容已复制')}</script></body></html>
