<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>作品评价入口</title><link rel="stylesheet" href="theme.css">
<style>
  :root{--accent:#78a8c7}.head{text-align:center}.switch{display:flex;justify-content:center;gap:10px;margin:0 0 20px}.switch a{text-decoration:none;color:#6e5a4b;padding:10px 18px;background:#fff;border-radius:999px;border:2px solid #ecd2a7;font-weight:800}.switch a.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .review-layout{display:grid;grid-template-columns:1fr 290px;gap:20px;align-items:start}form,.card,.guide{padding:27px}.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}.field{margin-bottom:18px}label{display:block;font-weight:800;margin-bottom:7px}input,textarea{width:100%;border:2px solid #ead5b2;border-radius:14px;padding:12px 13px;font:inherit;background:#fff}textarea{min-height:102px;resize:vertical}.ratings{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;margin-bottom:18px}.rating{background:#fff6df;border:1.5px solid #ecd49f;border-radius:17px;padding:14px}.stars{display:flex;gap:4px;margin-top:7px}.stars input{display:none}.stars label{font-size:28px;color:#d9c9ad;cursor:pointer;margin:0}.stars label.on{color:#eda13e}.submit{border:0;border-radius:16px;background:var(--accent);color:#fff;padding:14px 28px;font-size:18px;font-weight:900;cursor:pointer;width:100%}.guide{background:#fff9e9;border:2px solid #e8c98a;border-radius:25px;box-shadow:0 12px 28px rgba(92,60,30,.09);position:sticky;top:18px}.guide h2{font-size:22px;margin:0 0 14px}.guide ol{padding-left:21px;line-height:1.85;color:#786454}.guide p{background:#eef6e8;border-radius:15px;padding:12px;line-height:1.65;color:#61755b}.card{display:none;margin-top:22px}.card.show{display:block}.card h2{color:var(--accent)}.actions{display:flex;flex-wrap:wrap;gap:10px}.actions button,.actions a{border:0;border-radius:14px;background:#fff0c7;color:#6c5542;padding:10px 16px;font-weight:800;text-decoration:none;cursor:pointer}@media(max-width:760px){.review-layout{grid-template-columns:1fr}.guide{position:static}.row,.ratings{grid-template-columns:1fr}form{padding:21px}}
</style></head><body><main class="page"><nav class="topbar"><a href="index.html">← 返回课堂平台</a><span>公开网页 · 本机保存</span></nav>
<section class="storybook-banner"><div class="storybook-copy"><span class="eyebrow" id="eyebrow">同伴互助</span><h1 id="title"></h1><p id="intro"></p></div><div class="storybook-art" id="art"></div></section>
<nav class="switch"><a id="stu" href="?role=student">学生互评</a><a id="tea" href="?role=teacher">教师点评</a></nav>
<section class="review-layout"><form id="form"><div class="row"><div class="field"><label>评价人 *</label><input id="author" required placeholder="填写姓名或小组"></div><div class="field"><label>被评价作品 *</label><input id="work" required placeholder="填写作品名称"></div></div><div class="ratings" id="ratings"></div><div class="field"><label>我看到的优点 *</label><textarea id="good" required placeholder="说清楚哪一点做得好"></textarea></div><div class="field"><label>我的改进建议 *</label><textarea id="tip" required placeholder="提出一条具体、能做到的建议"></textarea></div><button class="submit" type="submit">生成作品评价卡</button></form><aside class="guide"><h2>暖心评价小口诀</h2><ol><li>先认真看作品</li><li>说清具体优点</li><li>提出一条建议</li><li>语言真诚友好</li></ol><p>可以这样说：“我喜欢……，如果能……，使用起来会更方便。”</p></aside></section>
<section class="card" id="card"><h2>作品评价卡</h2><div id="out"></div><div class="actions"><button onclick="downloadCard()">下载文字记录</button><button onclick="copyCard()">复制评价内容</button><a href="challenge.html">继续闯关</a></div></section></main>
<script>const role=new URLSearchParams(location.search).get('role')==='teacher'?'teacher':'student';const accent=role==='teacher'?'#a58cba':'#78a8c7';document.documentElement.style.setProperty('--accent',accent);title.innerHTML=role==='teacher'?'温和清楚的<br>教师作品点评':'认真友好的<br>学生作品互评';intro.textContent=role==='teacher'?'从需求、功能、安全和表达四方面给出明确指导。':'先说出作品的具体优点，再提出一条能够做到的建议。';eyebrow.textContent=role==='teacher'?'成长指导':'同伴互助';art.style.backgroundImage=`url('${role==='teacher'?'assets/hero-teacher.jpg':'assets/review-pair.jpg'}')`;document.getElementById(role==='teacher'?'tea':'stu').classList.add('on');const dims=['需求贴合','功能清楚','安全可靠','表达完整'];let scores=[0,0,0,0],text='';const ratings=document.getElementById('ratings');dims.forEach((d,i)=>{const box=document.createElement('div');box.className='rating';box.innerHTML=`<b>${d}</b><div class="stars">${[1,2,3,4,5].map(n=>`<label data-i="${i}" data-n="${n}">★</label>`).join('')}</div>`;ratings.appendChild(box)});ratings.onclick=e=>{if(e.target.dataset.n){const i=+e.target.dataset.i,n=+e.target.dataset.n;scores[i]=n;ratings.querySelectorAll(`[data-i="${i}"]`).forEach(x=>x.classList.toggle('on',+x.dataset.n<=n))}};form.onsubmit=e=>{e.preventDefault();if(scores.some(x=>!x)){alert('请完成四项星级评价');return}text=`${role==='teacher'?'教师点评':'学生互评'}\n评价人：${author.value}\n作品：${work.value}\n${dims.map((d,i)=>d+'：'+scores[i]+'星').join('\n')}\n优点：${good.value}\n建议：${tip.value}\n时间：${new Date().toLocaleString()}`;out.innerHTML=text.replaceAll('\n','<br>');card.classList.add('show');localStorage.setItem('elderReviewLatest',text);card.scrollIntoView({behavior:'smooth'})};function downloadCard(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));a.download=(work.value||'作品')+'评价.txt';a.click()}async function copyCard(){await navigator.clipboard.writeText(text);alert('评价内容已复制')}</script></body></html>
