<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>免登录草图立体预览</title>
<style>*{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei","PingFang SC",sans-serif;color:#574537;background:linear-gradient(145deg,#fff3cf,#e3f2ee);min-height:100vh}.wrap{max-width:1080px;margin:auto;padding:24px 18px 55px}.top{display:flex;justify-content:space-between}.top a{color:#6e5948;text-decoration:none;font-weight:700}h1{text-align:center;font-size:clamp(30px,5vw,48px);margin:18px 0 6px}.sub{text-align:center;color:#816d5c}.work{display:grid;grid-template-columns:310px 1fr;gap:18px;margin-top:20px}.panel,.stagebox{background:#fffdf8;border:3px solid #79b4a8;border-radius:25px;padding:20px;box-shadow:0 13px 30px rgba(68,92,80,.11)}label{display:block;font-weight:700;margin:12px 0 5px}input,textarea,select{width:100%;border:2px solid #d8d4b5;border-radius:12px;padding:10px;font:inherit}textarea{min-height:74px}.upload{display:grid;place-items:center;height:110px;background:#eff9f5;border:3px dashed #79b4a8;border-radius:15px;cursor:pointer;text-align:center}.upload input{display:none}.stage{height:470px;display:grid;place-items:center;perspective:900px;background:radial-gradient(circle,#fff 0 18%,#f7efd7 72%);border-radius:18px;overflow:hidden}.model{position:relative;max-width:72%;max-height:72%;transform-style:preserve-3d;transition:.2s}.model img{display:block;max-width:100%;max-height:330px;border:9px solid #fff;border-radius:14px;box-shadow:25px 30px 35px rgba(76,57,40,.25)}.model:after{content:"";position:absolute;inset:10px -18px -18px 18px;background:#d7a369;transform:translateZ(-24px);border-radius:14px;z-index:-1}.caption{text-align:center;margin-top:12px}.buttons{display:flex;gap:9px;margin-top:13px}.buttons button{flex:1;border:0;border-radius:999px;padding:11px;font-weight:700;cursor:pointer}.primary{background:#4f9e92;color:#fff}.soft{background:#fff0c7;color:#755941}.hint{font-size:13px;color:#887363}@media(max-width:760px){.work{grid-template-columns:1fr}.stage{height:390px}}</style></head>
<body><main class="wrap"><div class="top"><a href="modeling.html">← 返回建模工具中心</a><span>无需登录 · 图片不上传</span></div><h1>✨ 免登录草图立体预览</h1><p class="sub">上传自己的产品草图，调整角度和厚度，观察外形是否合理。</p><section class="work"><aside class="panel"><label class="upload">📷 点击选择草图图片<input id="file" type="file" accept="image/*"></label><label>左右旋转</label><input id="ry" type="range" min="-45" max="45" value="-15"><label>上下旋转</label><input id="rx" type="range" min="-30" max="30" value="8"><label>画面大小</label><input id="scale" type="range" min="70" max="125" value="100"><label>产品名称</label><input id="name" placeholder="例如：暖心提醒药盒"><label>解决的困难</label><textarea id="problem" placeholder="它准备帮助长辈解决什么问题？"></textarea><div class="buttons"><button class="primary" onclick="apply()">更新预览</button><button class="soft" onclick="window.print()">打印或保存PDF</button></div><p class="hint">所有图片和文字只在当前浏览器中处理，不需要注册，也不会上传服务器。</p></aside><div class="stagebox"><div class="stage"><div class="model" id="model"><img id="preview" alt="请先上传产品草图"></div></div><div class="caption"><h2 id="outName">等待上传产品草图</h2><p id="outProblem">调整角度后，从不同方向检查产品外形。</p></div></div></section></main><script>let data='';file.onchange=()=>{const f=file.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{data=r.result;preview.src=data;apply()};r.readAsDataURL(f)};[rx,ry,scale].forEach(x=>x.oninput=apply);function apply(){model.style.transform=`rotateX(${rx.value}deg) rotateY(${ry.value}deg) scale(${scale.value/100})`;outName.textContent=name.value||'我的助老产品草图';outProblem.textContent=problem.value||'从不同角度检查外形、结构和使用方式。'}</script></body></html>
