<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>作品整理与展示</title><style>*{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei","PingFang SC",sans-serif;color:#574638;background:linear-gradient(145deg,#fff4ce,#e4f3eb);min-height:100vh}.wrap{max-width:880px;margin:auto;padding:28px 18px 60px}.back{color:#6f5a49;text-decoration:none;font-weight:700}h1{text-align:center;font-size:clamp(31px,5vw,48px)}.panel,.workcard{background:#fffdf8;border:3px solid #d8c58e;border-radius:28px;padding:25px;box-shadow:0 14px 34px rgba(80,60,35,.11)}.row{display:grid;grid-template-columns:1fr 1fr;gap:15px}label{font-weight:700;display:block;margin:13px 0 6px}input,textarea{width:100%;border:2px solid #e3d3ad;border-radius:13px;padding:12px;font:inherit}textarea{min-height:96px}.upload{display:grid;place-items:center;border:3px dashed #78b6a7;border-radius:18px;min-height:160px;background:#f1fbf6;cursor:pointer;margin-top:14px}.upload input{display:none}.btn{border:0;border-radius:999px;background:#71b6a6;color:white;font-weight:700;font-size:18px;padding:13px;width:100%;margin-top:18px;cursor:pointer}.workcard{display:none;margin-top:22px;text-align:center}.workcard.show{display:block}.workcard img{max-width:100%;max-height:420px;border-radius:18px}.workcard h2{font-size:30px;margin-bottom:8px}.note{font-size:14px;color:#887361}.workcard button{border:0;border-radius:999px;background:#ef9b55;color:white;padding:10px 16px;font-weight:700;cursor:pointer}@media(max-width:620px){.row{grid-template-columns:1fr}}</style></head><body><main class="wrap"><a class="back" href="index.html">← 返回课堂平台</a><h1>🧰 作品整理与展示</h1><section class="panel"><div class="row"><div><label>作品名称 *</label><input id="title" placeholder="例如：会提醒的暖心药盒"></div><div><label>设计小组 *</label><input id="team" placeholder="填写小组名称"></div></div><label>一句设计说明 *</label><textarea id="desc" placeholder="它帮助长辈解决什么困难？"></textarea><label class="upload">📷 点击选择作品图片<input id="file" type="file" accept="image/*"></label><p class="note">图片只在当前浏览器中预览，不会上传个人信息。</p><button class="btn" onclick="makeCard()">生成作品展示卡</button></section><section class="workcard" id="card"><img id="preview" alt="作品图片"><h2 id="ctitle"></h2><b id="cteam"></b><p id="cdesc"></p><button onclick="window.print()">打印或保存为 PDF</button></section></main><script>let data='';file.onchange=()=>{const f=file.files[0];if(f){const r=new FileReader();r.onload=()=>data=r.result;r.readAsDataURL(f)}};function makeCard(){if(!title.value||!team.value||!desc.value||!data){alert('请填写完整并选择一张作品图片');return}preview.src=data;ctitle.textContent=title.value;cteam.textContent='设计小组：'+team.value;cdesc.textContent=desc.value;card.classList.add('show');card.scrollIntoView({behavior:'smooth'})}</script></body></html>
