<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>作品整理与展示</title><link rel="stylesheet" href="theme.css"><style>
  .editor{display:grid;grid-template-columns:1fr 280px;gap:20px;align-items:start}.panel,.workcard,.tips{padding:27px}.row{display:grid;grid-template-columns:1fr 1fr;gap:15px}label{font-weight:800;display:block;margin:14px 0 6px}input,textarea{width:100%;border:2px solid #e3d3ad;border-radius:14px;padding:12px;font:inherit}textarea{min-height:100px}.upload{display:grid;place-items:center;border:3px dashed #6fa99b;border-radius:19px;min-height:170px;background:#eff8f3;cursor:pointer;margin-top:15px;text-align:center;padding:20px}.upload b{display:block;font-size:19px;color:#4e8a7f}.upload small{display:block;margin-top:7px;color:#7b6a5d}.upload input{display:none}.btn{border:0;border-radius:16px;background:#6fa99b;color:white;font-weight:900;font-size:18px;padding:14px;width:100%;margin-top:18px;cursor:pointer}.tips{background:#fff9e9;border:2px solid #e8c98a;border-radius:25px;box-shadow:0 12px 28px rgba(92,60,30,.09);position:sticky;top:18px}.tips h2{font-size:22px;margin:0 0 12px}.tips ol{padding-left:21px;line-height:1.9;color:#786454}.workcard{display:none;margin-top:22px;text-align:center}.workcard.show{display:block}.workcard img{max-width:100%;max-height:450px;border-radius:20px;border:8px solid #fff;box-shadow:0 13px 30px rgba(80,60,35,.16)}.workcard h2{font-size:31px;margin-bottom:8px}.note{font-size:14px;color:#887361}.workcard button{border:0;border-radius:14px;background:#ef9b55;color:white;padding:11px 17px;font-weight:800;cursor:pointer}@media(max-width:760px){.editor{grid-template-columns:1fr}.tips{position:static}.row{grid-template-columns:1fr}}</style></head><body><main class="page"><nav class="topbar"><a href="index.html">← 返回课堂平台</a><span>图片不上传 · 本机预览</span></nav>
<section class="storybook-banner"><div class="storybook-copy"><span class="eyebrow">成果整理站</span><h1>让每一份创意<br>都有自己的故事</h1><p>放入作品图片，写清产品名称、设计小组和它解决的困难，生成一张整洁的作品展示卡。</p></div><div class="storybook-art" style="background-image:url('assets/works-pair.jpg')"></div></section>
<section class="editor"><section class="panel"><div class="row"><div><label>作品名称 *</label><input id="title" placeholder="例如：会提醒的暖心药盒"></div><div><label>设计小组 *</label><input id="team" placeholder="填写小组名称"></div></div><label>一句设计说明 *</label><textarea id="desc" placeholder="它帮助长辈解决什么困难？"></textarea><label class="upload"><span><b>点击选择作品图片</b><small>支持手机拍照或电脑中的图片</small></span><input id="file" type="file" accept="image/*"></label><p class="note">图片只在当前浏览器中预览，不会上传个人信息。</p><button class="btn" onclick="makeCard()">生成作品展示卡</button></section><aside class="tips"><h2>展示卡三句话</h2><ol><li>我们的作品叫……</li><li>它想帮助长辈解决……</li><li>最特别的地方是……</li></ol></aside></section><section class="workcard" id="card"><span class="eyebrow">我们的暖心作品</span><p><img id="preview" alt="作品图片"></p><h2 id="ctitle"></h2><b id="cteam"></b><p id="cdesc"></p><button onclick="window.print()">打印或保存为 PDF</button></section></main><script>let data='';file.onchange=()=>{const f=file.files[0];if(f){const r=new FileReader();r.onload=()=>data=r.result;r.readAsDataURL(f)}};function makeCard(){if(!title.value||!team.value||!desc.value||!data){alert('请填写完整并选择一张作品图片');return}preview.src=data;ctitle.textContent=title.value;cteam.textContent='设计小组：'+team.value;cdesc.textContent=desc.value;card.classList.add('show');card.scrollIntoView({behavior:'smooth'})}</script></body></html>
