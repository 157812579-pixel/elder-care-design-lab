<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>暖阳3D产品建模室</title><link rel="stylesheet" href="theme.css">
<style>
  .studio-hero{display:grid;grid-template-columns:1fr 310px;min-height:190px;background:#fffdf7;border:2.5px solid #e7c580;border-radius:30px;overflow:hidden;box-shadow:var(--shadow);margin:10px 0 18px}.studio-copy{padding:27px 34px;display:flex;flex-direction:column;justify-content:center}.studio-copy h1{font-size:clamp(31px,4.6vw,50px);line-height:1.1;margin:10px 0 8px}.studio-copy p{color:#7b6655;line-height:1.7;margin:0}.studio-art{background:url('assets/modeling-pair.jpg') 26% 50%/cover no-repeat;position:relative}.studio-art:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,#fffdf7,transparent 28%)}
  .preset-row{display:flex;gap:9px;flex-wrap:wrap;margin:0 0 15px}.preset-row b{align-self:center;margin-right:4px}.preset{border:1.5px solid #e4c38b;background:#fffaf0;color:#6e5746;border-radius:999px;padding:9px 14px;font-weight:800;cursor:pointer}.preset:hover{background:#fff0c7}
  .studio{display:grid;grid-template-columns:320px 1fr;gap:18px;align-items:start}.controls{background:#fffdf7;border:2.5px solid #e7c580;border-radius:28px;padding:20px;box-shadow:var(--shadow)}.control-section{border-bottom:1.5px dashed #e8cf9c;padding-bottom:17px;margin-bottom:17px}.control-section:last-child{border:0;margin:0;padding:0}.control-section h2{font-size:18px;margin:0 0 12px;display:flex;justify-content:space-between;align-items:center}.control-section h2 span{font-size:12px;color:#a06f45;background:#fff0c7;border-radius:999px;padding:4px 8px}.field{margin:11px 0}.field label{display:flex;justify-content:space-between;gap:12px;font-weight:800;font-size:14px;margin-bottom:7px}.field output{color:#d87550;font-weight:900}.field select,.field input[type=text]{width:100%;border:2px solid #e6d3ad;border-radius:12px;padding:10px;font:inherit;background:#fff}.field input[type=range]{width:100%;accent-color:#e98953}.swatches{display:flex;gap:9px;flex-wrap:wrap}.swatch{width:35px;height:35px;border-radius:12px;border:3px solid #fff;box-shadow:0 0 0 1.5px #d9c49f;cursor:pointer}.swatch.on{box-shadow:0 0 0 3px #e98255;transform:translateY(-2px)}
  .parts{display:grid;grid-template-columns:1fr 1fr;gap:8px}.part{border:1.5px solid #e4cfaa;background:#fffaf0;border-radius:13px;padding:10px 8px;font-weight:800;color:#705b4a;cursor:pointer;text-align:left}.part b{display:block;font-size:12px;color:#a17c5f;margin-bottom:3px}.part.on{background:#e7f4ed;border-color:#6fa99b;color:#467b71}.part.on b{color:#4b8a7e}
  .viewport-card{background:#fffdf7;border:2.5px solid #8db9ad;border-radius:28px;padding:14px;box-shadow:var(--shadow)}.viewport-top{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:4px 5px 12px}.viewport-top h2{font-size:19px;margin:0}.viewport-top span{color:#6b857e;font-size:13px;font-weight:800}.viewport{height:610px;position:relative;overflow:hidden;border-radius:21px;background:radial-gradient(circle at 50% 35%,#fffef9 0 16%,#f7efd8 58%,#eadbc0 100%)}.viewport canvas{display:block;width:100%;height:100%;cursor:grab}.viewport canvas:active{cursor:grabbing}.loading{position:absolute;inset:0;display:grid;place-items:center;color:#846c58;font-weight:900;background:#f8efd9;z-index:4}.model-label{position:absolute;left:18px;top:16px;background:rgba(255,253,247,.88);border:1.5px solid #e7c98e;border-radius:14px;padding:10px 13px;pointer-events:none;box-shadow:0 7px 16px rgba(84,55,29,.08)}.model-label b{display:block}.model-label small{color:#7b6a5c}.tip{position:absolute;right:14px;bottom:13px;background:rgba(83,61,49,.78);color:#fff;border-radius:999px;padding:8px 12px;font-size:12px;pointer-events:none}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:13px}.action{border:0;border-radius:14px;padding:12px 9px;font-weight:900;cursor:pointer;background:#fff0c7;color:#735844}.action.primary{background:#e98953;color:#fff}.action.green{background:#6fa99b;color:#fff}.status{margin:12px 2px 2px;color:#6f5c4d;font-size:13px;line-height:1.55}.no-webgl{padding:30px;text-align:center;color:#8a5b42}
  @media(max-width:880px){.studio{grid-template-columns:1fr}.controls{display:grid;grid-template-columns:1fr 1fr;gap:18px}.control-section{border-bottom:0;margin:0}.viewport{height:520px}}
  @media(max-width:650px){.studio-hero{grid-template-columns:1fr}.studio-art{height:200px;order:-1}.studio-art:before{background:linear-gradient(0deg,#fffdf7,transparent 34%)}.studio-copy{padding:23px}.controls{grid-template-columns:1fr}.parts{grid-template-columns:1fr 1fr}.viewport{height:430px}.actions{grid-template-columns:1fr}.preset-row b{width:100%}}
</style></head>
<body><main class="page"><nav class="topbar"><a href="modeling.html">← 返回建模工具中心</a><span>真实3D建模 · 无需登录</span></nav>
<section class="studio-hero"><div class="studio-copy"><span class="eyebrow">暖阳3D设计室</span><h1>调整参数<br>做出自己的助老产品</h1><p>拖动模型旋转观察，修改外形尺寸，再添加大按钮、显示屏、提手等适老部件。</p></div><div class="studio-art"></div></section>
<div class="preset-row"><b>从一个产品开始：</b><button class="preset" data-preset="pillbox">提醒药盒</button><button class="preset" data-preset="remote">大键遥控器</button><button class="preset" data-preset="caller">暖心呼叫器</button><button class="preset" data-preset="blank">自由设计</button></div>
<section class="studio"><aside class="controls">
  <section class="control-section"><h2>主体外形 <span>参数建模</span></h2><div class="field"><label>产品名称</label><input id="productName" type="text" value="暖心提醒药盒" maxlength="24"></div><div class="field"><label>基础形状</label><select id="shape"><option value="rounded">圆角产品壳体</option><option value="oval">椭圆产品壳体</option></select></div><div class="field"><label>宽度 <output id="widthOut">160 mm</output></label><input id="width" type="range" min="70" max="220" value="160"></div><div class="field"><label>深度 <output id="depthOut">105 mm</output></label><input id="depth" type="range" min="30" max="170" value="105"></div><div class="field"><label>高度 <output id="heightOut">58 mm</output></label><input id="height" type="range" min="25" max="165" value="58"></div><div class="field"><label>圆润程度 <output id="radiusOut">16 mm</output></label><input id="radius" type="range" min="4" max="32" value="16"></div></section>
  <section class="control-section"><h2>外壳颜色 <span>暖心配色</span></h2><div class="swatches" id="swatches"><button class="swatch on" data-color="#ef8b4c" style="background:#ef8b4c" aria-label="暖橙"></button><button class="swatch" data-color="#70a99b" style="background:#70a99b" aria-label="青绿"></button><button class="swatch" data-color="#e78782" style="background:#e78782" aria-label="珊瑚粉"></button><button class="swatch" data-color="#7da8c6" style="background:#7da8c6" aria-label="柔蓝"></button><button class="swatch" data-color="#e1b850" style="background:#e1b850" aria-label="暖黄"></button><button class="swatch" data-color="#a58bb8" style="background:#a58bb8" aria-label="浅紫"></button></div></section>
  <section class="control-section"><h2>适老功能件 <span>点击添加</span></h2><div class="parts"><button class="part on" data-part="button"><b>已添加</b>醒目大按钮</button><button class="part on" data-part="screen"><b>已添加</b>清晰显示屏</button><button class="part" data-part="handle"><b>未添加</b>防滑提手</button><button class="part" data-part="speaker"><b>未添加</b>语音提示孔</button><button class="part" data-part="label"><b>未添加</b>大字标签区</button><button class="part on" data-part="base"><b>已添加</b>防滑底座</button></div></section>
 </aside>
 <section class="viewport-card"><div class="viewport-top"><h2>三维模型预览</h2><span>拖动旋转 · 滚轮缩放</span></div><div class="viewport" id="viewport"><div class="loading" id="loading">正在打开三维设计室…</div><div class="model-label"><b id="labelName">暖心提醒药盒</b><small id="labelSize">160 × 105 × 58 mm</small></div><div class="tip">鼠标拖动模型，查看每一个方向</div></div><div class="actions"><button class="action" id="resetView">恢复观察角度</button><button class="action green" id="saveImage">保存模型图片</button><button class="action primary" id="saveModel">导出 STL 模型</button></div><p class="status" id="status">模型由圆润壳体、醒目大按钮、清晰显示屏和防滑底座组成。STL 文件可继续用于其他三维软件或3D打印。</p></section>
</section></main>
<script type="text/plain" id="modeler-source">
import * as THREE from 'three';
import { OrbitControls } from './assets/OrbitControls.js';
import { STLExporter } from './assets/STLExporter.js';

const $=id=>document.getElementById(id);const viewport=$('viewport');
let renderer;
try{renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,preserveDrawingBuffer:true});}catch(e){$('loading').innerHTML='<div class="no-webgl">当前浏览器未开启三维显示，请换用最新版 Edge、Chrome 或 Safari。</div>';throw e}
renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFShadowMap;renderer.outputColorSpace=THREE.SRGBColorSpace;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.08;viewport.insertBefore(renderer.domElement,viewport.firstChild);
const scene=new THREE.Scene();const camera=new THREE.PerspectiveCamera(34,1,1,1800);camera.position.set(310,235,355);
const controls=new OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.dampingFactor=.07;controls.minDistance=170;controls.maxDistance=760;controls.target.set(0,45,0);
scene.add(new THREE.HemisphereLight(0xfff8e7,0x705d4b,2.25));const key=new THREE.DirectionalLight(0xffffff,3.1);key.position.set(180,280,220);key.castShadow=true;key.shadow.mapSize.set(1024,1024);scene.add(key);const fill=new THREE.DirectionalLight(0xffd5b0,1.6);fill.position.set(-180,110,-150);scene.add(fill);
const ground=new THREE.Mesh(new THREE.CircleGeometry(260,80),new THREE.ShadowMaterial({color:0x6d4b2e,opacity:.16}));ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;ground.position.y=-.8;scene.add(ground);
const modelRoot=new THREE.Group();scene.add(modelRoot);const state={shape:'rounded',width:160,depth:105,height:58,radius:16,color:'#ef8b4c',parts:new Set(['button','screen','base'])};
const partNames={button:'醒目大按钮',screen:'清晰显示屏',handle:'防滑提手',speaker:'语音提示孔',label:'大字标签区',base:'防滑底座'};

function roundedGeometry(w,h,d,r){r=Math.max(1,Math.min(r,w/2-1,h/2-1));const x=-w/2,y=-h/2,s=new THREE.Shape();s.moveTo(x+r,y);s.lineTo(x+w-r,y);s.quadraticCurveTo(x+w,y,x+w,y+r);s.lineTo(x+w,y+h-r);s.quadraticCurveTo(x+w,y+h,x+w-r,y+h);s.lineTo(x+r,y+h);s.quadraticCurveTo(x,y+h,x,y+h-r);s.lineTo(x,y+r);s.quadraticCurveTo(x,y,x+r,y);const bevel=Math.min(3,r*.28,d*.12);const g=new THREE.ExtrudeGeometry(s,{depth:d,bevelEnabled:true,bevelSegments:4,bevelSize:bevel,bevelThickness:bevel,curveSegments:18});g.translate(0,0,-d/2);g.computeVertexNormals();return g}
function mat(color,rough=.5,metal=.04){return new THREE.MeshStandardMaterial({color,roughness:rough,metalness:metal})}
function mesh(g,m,shadow=true){const x=new THREE.Mesh(g,m);x.castShadow=shadow;x.receiveShadow=shadow;return x}
function addOutline(obj){const e=new THREE.LineSegments(new THREE.EdgesGeometry(obj.geometry,28),new THREE.LineBasicMaterial({color:0x6f5542,transparent:true,opacity:.16}));obj.add(e)}
function addButton(w,h,d,lift){const r=Math.max(11,Math.min(20,w*.105));const b=mesh(new THREE.CylinderGeometry(r,r,8,48),mat(0xf6c955,.38));b.rotation.x=Math.PI/2;b.position.set(-w*.22,lift+h*.62,d/2+6);modelRoot.add(b);const ring=mesh(new THREE.TorusGeometry(r+3,2.2,12,48),mat(0xfff1c4,.5));ring.position.copy(b.position);modelRoot.add(ring)}
function addScreen(w,h,d,lift){const pw=Math.min(w*.38,66),ph=Math.min(Math.max(h*.24,18),34);const frame=mesh(roundedGeometry(pw,ph,5,4),mat(0xf5ead2,.45));frame.position.set(w*.18,lift+h*.64,d/2+4);modelRoot.add(frame);const glass=mesh(roundedGeometry(pw-7,ph-7,3,3),mat(0x263e46,.2,.12));glass.position.set(w*.18,lift+h*.64,d/2+7);modelRoot.add(glass);const glow=mesh(new THREE.PlaneGeometry(pw*.58,2),new THREE.MeshBasicMaterial({color:0xb8f0d7}));glow.position.set(w*.18,lift+h*.64,d/2+9);modelRoot.add(glow)}
function addHandle(w,h,lift){const pts=[new THREE.Vector3(-w*.27,lift+h+1,0),new THREE.Vector3(-w*.22,lift+h+31,0),new THREE.Vector3(w*.22,lift+h+31,0),new THREE.Vector3(w*.27,lift+h+1,0)];const curve=new THREE.CatmullRomCurve3(pts);const handle=mesh(new THREE.TubeGeometry(curve,42,5,14,false),mat(0x5f8d82,.42));modelRoot.add(handle)}
function addSpeaker(w,h,d,lift){const group=new THREE.Group();for(let row=0;row<2;row++)for(let col=0;col<3;col++){const hole=mesh(new THREE.CylinderGeometry(2.6,2.6,3,20),mat(0x4d554f,.55));hole.rotation.x=Math.PI/2;hole.position.set(w*.24+col*8-w*.08,lift+h*.28+row*8,d/2+4);group.add(hole)}modelRoot.add(group)}
function addLabel(w,h,d,lift){const lw=Math.min(70,w*.47),lh=Math.min(24,h*.24);const plate=mesh(roundedGeometry(lw,lh,3,4),mat(0xfff8e7,.65));plate.position.set(0,lift+h*.27,d/2+4);modelRoot.add(plate);const line1=mesh(new THREE.BoxGeometry(lw*.65,2,1.2),new THREE.MeshBasicMaterial({color:0xd8875f}));line1.position.set(0,lift+h*.3,d/2+6);modelRoot.add(line1);const line2=line1.clone();line2.scale.x=.72;line2.position.y=lift+h*.24;modelRoot.add(line2)}
function rebuild(){while(modelRoot.children.length){const o=modelRoot.children.pop();o.traverse(x=>{x.geometry?.dispose();if(Array.isArray(x.material))x.material.forEach(m=>m.dispose());else x.material?.dispose()})}const {width:w,depth:d,height:h,radius:r,color}=state;const lift=state.parts.has('base')?9:0;let body;if(state.shape==='oval'){const g=new THREE.CylinderGeometry(w/2,w/2,h,72,1,false);g.scale(1,1,d/w);body=mesh(g,mat(color,.48))}else body=mesh(roundedGeometry(w,h,d,r),mat(color,.46));body.position.y=lift+h/2;addOutline(body);modelRoot.add(body);if(state.parts.has('base')){const base=mesh(roundedGeometry(w*.9,9,d*.83,5),mat(0x4f6962,.68));base.position.y=4.5;modelRoot.add(base)}if(state.parts.has('button'))addButton(w,h,d,lift);if(state.parts.has('screen'))addScreen(w,h,d,lift);if(state.parts.has('handle'))addHandle(w,h,lift);if(state.parts.has('speaker'))addSpeaker(w,h,d,lift);if(state.parts.has('label'))addLabel(w,h,d,lift);updateText()}
function updateText(){$('widthOut').textContent=state.width+' mm';$('depthOut').textContent=state.depth+' mm';$('heightOut').textContent=state.height+' mm';$('radiusOut').textContent=state.radius+' mm';$('labelName').textContent=$('productName').value||'我的助老产品';$('labelSize').textContent=`${state.width} × ${state.depth} × ${state.height} mm`;const names=[...state.parts].map(x=>partNames[x]);$('status').textContent=`模型由${state.shape==='rounded'?'圆角':'椭圆'}产品壳体${names.length?'、'+names.join('、'):''}组成。STL 文件可继续用于其他三维软件或3D打印。`}
['width','depth','height','radius'].forEach(id=>$(id).addEventListener('input',e=>{state[id]=+e.target.value;rebuild()}));$('shape').addEventListener('change',e=>{state.shape=e.target.value;rebuild()});$('productName').addEventListener('input',updateText);$('swatches').addEventListener('click',e=>{const b=e.target.closest('.swatch');if(!b)return;document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('on'));b.classList.add('on');state.color=b.dataset.color;rebuild()});document.querySelector('.parts').addEventListener('click',e=>{const b=e.target.closest('.part');if(!b)return;state.parts.has(b.dataset.part)?state.parts.delete(b.dataset.part):state.parts.add(b.dataset.part);b.classList.toggle('on',state.parts.has(b.dataset.part));b.querySelector('b').textContent=state.parts.has(b.dataset.part)?'已添加':'未添加';rebuild()});
const presets={pillbox:{name:'暖心提醒药盒',shape:'rounded',width:160,depth:105,height:58,radius:16,color:'#ef8b4c',parts:['button','screen','base']},remote:{name:'大键语音遥控器',shape:'rounded',width:82,depth:34,height:150,radius:15,color:'#7da8c6',parts:['button','speaker','label']},caller:{name:'一键暖心呼叫器',shape:'oval',width:118,depth:78,height:44,radius:14,color:'#e78782',parts:['button','speaker','base']},blank:{name:'我的助老产品',shape:'rounded',width:135,depth:90,height:65,radius:14,color:'#70a99b',parts:[]}};
document.querySelector('.preset-row').addEventListener('click',e=>{const b=e.target.closest('.preset');if(!b)return;const p=presets[b.dataset.preset];Object.assign(state,{shape:p.shape,width:p.width,depth:p.depth,height:p.height,radius:p.radius,color:p.color,parts:new Set(p.parts)});$('productName').value=p.name;$('shape').value=p.shape;['width','depth','height','radius'].forEach(id=>$(id).value=p[id]);document.querySelectorAll('.swatch').forEach(x=>x.classList.toggle('on',x.dataset.color===p.color));document.querySelectorAll('.part').forEach(x=>{const on=state.parts.has(x.dataset.part);x.classList.toggle('on',on);x.querySelector('b').textContent=on?'已添加':'未添加'});rebuild();fitView()});
function fitView(){const size=Math.max(state.width,state.depth,state.height+(state.parts.has('handle')?50:0));camera.position.set(size*1.65,size*1.25,size*1.85);controls.target.set(0,(state.height+(state.parts.has('handle')?30:0))*.46,0);controls.update()}
$('resetView').onclick=fitView;function safeName(){return($('productName').value||'助老产品模型').replace(/[\\/:*?"<>|]/g,'_')}
$('saveImage').onclick=()=>{renderer.render(scene,camera);renderer.domElement.toBlob(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=safeName()+'.png';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)},'image/png')};$('saveModel').onclick=()=>{const data=new STLExporter().parse(modelRoot,{binary:true});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type:'model/stl'}));a.download=safeName()+'.stl';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)};
new ResizeObserver(()=>{const w=viewport.clientWidth,h=viewport.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix()}).observe(viewport);function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera)}rebuild();fitView();$('loading').remove();animate();
</script>
<script>
(function(){
  let started=false;
  const showError=()=>{const box=document.getElementById('loading');if(box&&!started){box.innerHTML='<div class="no-webgl"><b>三维程序没有正常启动</b><br><small>请刷新页面，或使用最新版 Edge、Chrome、Safari 打开。</small><br><button class="preset" style="margin-top:14px" onclick="location.reload()">重新打开</button></div>'}};
  window.addEventListener('error',showError);
  window.addEventListener('unhandledrejection',showError);
  const observer=new MutationObserver(()=>{if(!document.getElementById('loading')){started=true;observer.disconnect()}});
  observer.observe(document.body,{childList:true,subtree:true});
  setTimeout(showError,12000);
})();
</script>
<script src="assets/modeler.bundle.js"></script>
</body></html>
