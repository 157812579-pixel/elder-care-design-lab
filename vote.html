<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>班级作品投票</title><link rel="stylesheet" href="theme.css"><style>
  .vote-layout{display:grid;grid-template-columns:1fr 280px;gap:20px;align-items:start}.box,.ticket,.rule{padding:27px}label{font-weight:800;display:block;margin:16px 0 7px}input,select,textarea{width:100%;border:2px solid #ead2a7;border-radius:14px;padding:12px;font:inherit;background:#fff}textarea{min-height:105px}.awards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.award{border:2px solid #e8ceb0;border-radius:18px;padding:16px 8px;text-align:center;cursor:pointer;background:#fff;line-height:1.6}.award b{display:block;font-size:22px;color:#d87554;margin-bottom:2px}.award.on{background:#fff0bd;border-color:#ef9b55;transform:translateY(-2px)}.award input{display:none}.go{width:100%;margin-top:20px;border:0;border-radius:16px;background:#e9826e;color:#fff;padding:14px;font-size:18px;font-weight:900;cursor:pointer}.rule{background:#fff9e9;border:2px solid #e8c98a;border-radius:25px;box-shadow:0 12px 28px rgba(92,60,30,.09);position:sticky;top:18px}.rule h2{font-size:22px;margin:0 0 12px}.rule ul{padding-left:20px;line-height:1.9;color:#786454}.rule p{background:#eef6e8;border-radius:15px;padding:12px;color:#5f765a;line-height:1.6}.ticket{display:none;margin-top:20px}.ticket.show{display:block}.ticket button{border:0;border-radius:14px;background:#6fa99b;color:#fff;padding:11px 17px;font-weight:800;cursor:pointer}@media(max-width:760px){.vote-layout{grid-template-columns:1fr}.rule{position:static}.awards{grid-template-columns:1fr}}</style></head><body><main class="page"><nav class="topbar"><a href="index.html">← 返回课堂平台</a><span>一人一票 · 公平选择</span></nav>
<section class="storybook-banner"><div class="storybook-copy"><span class="eyebrow">班级作品展</span><h1>把认真一票<br>送给暖心创意</h1><p>先看清作品解决了什么困难，再选择合适的奖项，并写下一句真诚的投票理由。</p></div><div class="storybook-art" style="background-image:url('assets/vote-group.jpg')"></div></section>
<section class="vote-layout"><form class="box" id="form"><label>投票人 *</label><input id="name" required placeholder="填写姓名或小组"><label>作品名称 *</label><input id="work" required placeholder="填写你选择的作品"><label>选择奖项 *</label><div class="awards"><label class="award"><input type="radio" name="award" value="最佳创意奖" required><b>01</b>最佳创意奖</label><label class="award"><input type="radio" name="award" value="最佳实用奖"><b>02</b>最佳实用奖</label><label class="award"><input type="radio" name="award" value="最暖心设计奖"><b>03</b>最暖心设计奖</label></div><label>投票理由 *</label><textarea id="reason" required placeholder="用一句话说清楚为什么选择它"></textarea><button class="go">提交并生成投票凭证</button></form><aside class="rule"><h2>投票小约定</h2><ul><li>看完全部作品再选择</li><li>关注是否真正方便长辈</li><li>不为自己或好友随意投票</li></ul><p>好理由要说清楚：作品帮助了谁，解决了什么困难。</p></aside></section><section class="ticket" id="ticket"><h2>投票已记录</h2><div id="out"></div><p><button onclick="downloadVote()">下载投票凭证</button></p></section></main><script>document.querySelectorAll('.award').forEach(x=>x.onclick=()=>{document.querySelectorAll('.award').forEach(y=>y.classList.remove('on'));x.classList.add('on')});let text='';form.onsubmit=e=>{e.preventDefault();const award=new FormData(form).get('award');text=`班级作品投票凭证\n投票人：${name.value}\n作品：${work.value}\n奖项：${award}\n理由：${reason.value}\n时间：${new Date().toLocaleString()}`;out.innerHTML=text.replaceAll('\n','<br>');ticket.classList.add('show');const old=JSON.parse(localStorage.getItem('elderVotes')||'[]');old.push(text);localStorage.setItem('elderVotes',JSON.stringify(old));ticket.scrollIntoView({behavior:'smooth'})};function downloadVote(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));a.download='投票凭证.txt';a.click()}</script></body></html>
