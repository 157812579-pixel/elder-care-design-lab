<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>班级作品投票</title><style>*{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei","PingFang SC",sans-serif;color:#5b4636;background:linear-gradient(145deg,#fff1c9,#ffe0d0);min-height:100vh}.wrap{max-width:760px;margin:auto;padding:28px 18px 60px}.back{color:#745a47;text-decoration:none;font-weight:700}.hero{text-align:center}.hero h1{font-size:clamp(32px,6vw,50px);margin:20px 0 8px}.box,.ticket{background:#fffdf8;border:3px solid #efc276;border-radius:28px;padding:26px;box-shadow:0 14px 34px rgba(90,60,30,.12)}label{font-weight:700;display:block;margin:15px 0 7px}input,select,textarea{width:100%;border:2px solid #ead2a7;border-radius:13px;padding:12px;font:inherit;background:#fff}textarea{min-height:100px}.awards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.award{border:2px solid #e8ceb0;border-radius:16px;padding:13px 7px;text-align:center;cursor:pointer;background:#fff}.award.on{background:#fff0bd;border-color:#ef9b55}.award input{display:none}.go{width:100%;margin-top:20px;border:0;border-radius:999px;background:#ef8f72;color:#fff;padding:14px;font-size:18px;font-weight:700;cursor:pointer}.ticket{display:none;margin-top:20px}.ticket.show{display:block}.ticket button{border:0;border-radius:999px;background:#71b6a6;color:#fff;padding:10px 16px;font-weight:700;cursor:pointer}@media(max-width:620px){.awards{grid-template-columns:1fr}}</style></head><body><main class="wrap"><a class="back" href="index.html">← 返回课堂平台</a><header class="hero"><h1>🎖️ 班级作品投票</h1><p>看完全部作品，再投出认真、公平的一票。</p></header><form class="box" id="form"><label>投票人 *</label><input id="name" required placeholder="姓名或小组"><label>作品名称 *</label><input id="work" required placeholder="填写你选择的作品"><label>选择奖项 *</label><div class="awards"><label class="award"><input type="radio" name="award" value="最佳创意奖" required>💡<br>最佳创意奖</label><label class="award"><input type="radio" name="award" value="最佳实用奖">🧰<br>最佳实用奖</label><label class="award"><input type="radio" name="award" value="最暖心设计奖">🌼<br>最暖心设计奖</label></div><label>投票理由 *</label><textarea id="reason" required placeholder="用一句话说清楚为什么选择它"></textarea><button class="go">提交并生成投票凭证</button></form><section class="ticket" id="ticket"><h2>✅ 投票已记录</h2><div id="out"></div><p><button onclick="downloadVote()">下载投票凭证</button></p></section></main><script>document.querySelectorAll('.award').forEach(x=>x.onclick=()=>{document.querySelectorAll('.award').forEach(y=>y.classList.remove('on'));x.classList.add('on')});let text='';form.onsubmit=e=>{e.preventDefault();const award=new FormData(form).get('award');text=`班级作品投票凭证\n投票人：${name.value}\n作品：${work.value}\n奖项：${award}\n理由：${reason.value}\n时间：${new Date().toLocaleString()}`;out.innerHTML=text.replaceAll('\n','<br>');ticket.classList.add('show');const old=JSON.parse(localStorage.getItem('elderVotes')||'[]');old.push(text);localStorage.setItem('elderVotes',JSON.stringify(old));ticket.scrollIntoView({behavior:'smooth'})};function downloadVote(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));a.download='投票凭证.txt';a.click()}</script></body></html>
