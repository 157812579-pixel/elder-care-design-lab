<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>免登录积木建模台</title><link rel="stylesheet" href="theme.css"><style>
  .tool-intro{display:grid;grid-template-columns:1fr 360px;min-height:210px;background:#fffdf7;border:2.5px solid #e8c98a;border-radius:30px;overflow:hidden;box-shadow:var(--shadow);margin:12px 0 20px}.intro-copy{padding:30px 34px;display:flex;flex-direction:column;justify-content:center}.intro-copy h1{font-size:clamp(31px,4vw,47px);line-height:1.15;margin:10px 0 8px}.intro-copy p{color:#7b6655;line-height:1.7;margin:0}.intro-art{background:url('assets/modeling-pair.jpg') 38% 52%/cover no-repeat;position:relative}.intro-art:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,#fffdf7,transparent 32%)}
  .work{display:grid;grid-template-columns:260px 1fr;gap:18px;align-items:start}.panel,.canvasbox{padding:19px}.panel label{display:block;font-weight:800;margin:13px 0 6px}.panel select,.panel input{width:100%;padding:10px;border:2px solid #e7d3ad;border-radius:12px;font:inherit}.panel button{width:100%;border:0;border-radius:14px;padding:12px;margin-top:10px;font-weight:800;cursor:pointer}.primary{background:#ef8b4c;color:#fff}.soft{background:#e8f4ee;color:#47786d}.danger{background:#fff0e7;color:#b55f43}.canvasbox{overflow:auto;text-align:center}canvas{max-width:100%;height:auto;background:linear-gradient(#fffaf0,#f7f2df);border-radius:18px;cursor:crosshair}.hint{font-size:14px;color:#887361;line-height:1.65}.status{text-align:center;font-weight:800;color:#4e8d81;margin:10px}.tool-note{text-align:center;color:#7d6755;margin:0 0 18px;font-weight:700}@media(max-width:760px){.tool-intro{grid-template-columns:1fr}.intro-art{height:215px;order:-1}.intro-art:before{background:linear-gradient(0deg,#fffdf7,transparent 34%)}.intro-copy{padding:24px}.work{grid-template-columns:1fr}.panel{display:grid;grid-template-columns:1fr 1fr;gap:8px}.panel .full{grid-column:1/-1}}
</style></head><body><main class="page"><nav class="topbar"><a href="modeling.html">← 返回建模工具中心</a><span>无需登录 · 本机操作</span></nav><section class="tool-intro"><div class="intro-copy"><span class="eyebrow">网页积木工坊</span><h1>搭一搭，试一试<br>把想法变成立体</h1><p>选择形体、颜色和高度，再点击画布中的格子放置模型。</p></div><div class="intro-art"></div></section><p class="tool-note">从简单外形开始，边搭建边检查产品是否方便、安全。</p><section class="work"><aside class="panel"><div><label>形体</label><select id="shape"><option value="cube">方块</option><option value="cylinder">圆柱</option></select></div><div><label>颜色</label><input id="color" type="color" value="#ef8b4c"></div><div><label>高度</label><select id="height"><option value="1">1层</option><option value="2">2层</option><option value="3">3层</option></select></div><button class="primary full" onclick="mode='add'">开始放置</button><button class="soft full" onclick="undo()">撤销一步</button><button class="danger full" onclick="clearAll()">清空画布</button><button class="primary full" onclick="downloadPng()">下载模型图片</button><p class="hint full">点击空格放置形体；点击已有形体可叠加。模型只保存在当前页面，不会上传。</p></aside><div class="canvasbox"><canvas id="cv" width="820" height="560"></canvas><div class="status" id="status">已放置 0 个形体</div></div></section></main>
<script>const cv=document.getElementById('cv'),ctx=cv.getContext('2d');const N=8,tw=42,th=22,ox=410,oy=68;let items=[],mode='add';function iso(i,j,z=0){return{x:ox+(i-j)*tw,y:oy+(i+j)*th-z}}function shade(hex,p){const n=parseInt(hex.slice(1),16),r=Math.min(255,Math.max(0,(n>>16)+p)),g=Math.min(255,Math.max(0,((n>>8)&255)+p)),b=Math.min(255,Math.max(0,(n&255)+p));return`rgb(${r},${g},${b})`}function poly(points,fill,stroke='#8d765f'){ctx.beginPath();points.forEach((p,k)=>k?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=1.2;ctx.stroke()}function grid(){ctx.clearRect(0,0,cv.width,cv.height);for(let i=0;i<N;i++)for(let j=0;j<N;j++){const p=iso(i,j),a={x:p.x,y:p.y},b={x:p.x+tw,y:p.y+th},c={x:p.x,y:p.y+th*2},d={x:p.x-tw,y:p.y+th};poly([a,b,c,d],(i+j)%2?'#fff8e7':'#fffdf6','#ddcba8')}}function cube(it){const base=iso(it.i,it.j),h=30*it.h,a={x:base.x,y:base.y-h},b={x:base.x+tw,y:base.y+th-h},c={x:base.x,y:base.y+th*2-h},d={x:base.x-tw,y:base.y+th-h},bb={x:base.x+tw,y:base.y+th},cc={x:base.x,y:base.y+th*2},dd={x:base.x-tw,y:base.y+th};poly([d,c,cc,dd],shade(it.color,-18));poly([b,c,cc,bb],shade(it.color,-35));poly([a,b,c,d],shade(it.color,25))}function cylinder(it){const p=iso(it.i,it.j),h=30*it.h,w=tw*1.25;ctx.fillStyle=shade(it.color,-22);ctx.fillRect(p.x-w/2,p.y+th-h,w,h);ctx.beginPath();ctx.ellipse(p.x,p.y+th,w/2,th,0,0,Math.PI*2);ctx.fillStyle=shade(it.color,-28);ctx.fill();ctx.strokeStyle='#8d765f';ctx.stroke();ctx.beginPath();ctx.ellipse(p.x,p.y+th-h,w/2,th,0,0,Math.PI*2);ctx.fillStyle=shade(it.color,24);ctx.fill();ctx.stroke()}function draw(){grid();items.sort((a,b)=>(a.i+a.j)-(b.i+b.j)).forEach(it=>it.shape==='cube'?cube(it):cylinder(it));status.textContent=`已放置 ${items.length} 个形体`}cv.onclick=e=>{const r=cv.getBoundingClientRect(),x=(e.clientX-r.left)*cv.width/r.width,y=(e.clientY-r.top)*cv.height/r.height,dx=x-ox,dy=y-oy,i=Math.floor((dy/th+dx/tw)/2),j=Math.floor((dy/th-dx/tw)/2);if(i>=0&&i<N&&j>=0&&j<N){items.push({i,j,shape:shape.value,color:color.value,h:+height.value});draw()}};function undo(){items.pop();draw()}function clearAll(){items=[];draw()}function downloadPng(){draw();const a=document.createElement('a');a.href=cv.toDataURL('image/png');a.download='助老产品积木模型.png';a.click()}draw();</script></body></html>
